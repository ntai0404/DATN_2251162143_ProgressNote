version: '3.8'

services:
  # 🧠 Vector Database - Tri thức cốt lõi
  qdrant:
    image: qdrant/qdrant:latest
    container_name: tlu-vector-db
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: always

  # 📬 Message Broker - Giao tiếp sự kiện
  rabbitmq:
    image: rabbitmq:3-management
    container_name: tlu-message-broker
    ports:
      - "5672:5672"   # Cổng dữ liệu
      - "15672:15672" # Giao diện quản lý (Web UI)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: always

networks:
  default:
    name: tlu-network
